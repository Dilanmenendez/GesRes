{% extends 'base.html' %}
{% load static %}

{% block content %}
{% include 'includes/header4.html' %}

<div class="grid-container">
  <div class="grid-x grid-margin-x align-center">
    <div class="cell small-12 medium-8 large-6">

      <h2 class="text-center" style="margin: 1.5rem 0;">
        Editar Ingrediente del Plato
      </h2>

      <form method="post" class="callout secondary shadow">
        {% csrf_token %}

        <ul class="vertical menu">

          <li>
            <label><strong>{{ form.producto.label }}</strong></label>
            {{ form.producto }}
          </li>

          <li>
            <label><strong>{{ form.cantidad.label }} (kg)</strong></label>
            {{ form.cantidad }}
          </li>

        </ul>

        <div class="button-group align-center" style="margin-top:2rem;">

          <button type="submit" class="button warning">
            Actualizar
          </button>

          <a href="{% url 'ventas_app:detail_plato' object.plato.id %}"
             class="button secondary">
            Cancelar
          </a>

        </div>

      </form>

    </div>
  </div>
</div>

{% endblock content %}
